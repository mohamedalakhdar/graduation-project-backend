apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: college-system

resources:
  - ../../base
  - ingress.yaml

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: api
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
    target:
      kind: Deployment
      name: api

configMapGenerator:
  - name: college-config
    behavior: merge
    files:
      - configmap-patch.yaml

secretGenerator:
  - name: college-secrets
    behavior: replace
    files:
      - secrets.yaml
