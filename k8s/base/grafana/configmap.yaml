apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  labels:
    app.kubernetes.io/name: college-control-system
    app.kubernetes.io/component: grafana
    app.kubernetes.io/part-of: college-control-system
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: Default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
  dashboard-aspnetcore.json: |
    {
      "title": "ASP.NET Core",
      "uid": "aspnetcore",
      "panels": [],
      "tags": ["aspnet", "dotnet"],
      "schemaVersion": 38
    }
  dashboard-k8s-cluster.json: |
    {
      "title": "Kubernetes Cluster",
      "uid": "k8s-cluster",
      "panels": [],
      "tags": ["kubernetes"],
      "schemaVersion": 38
    }
  dashboard-postgres.json: |
    {
      "title": "PostgreSQL",
      "uid": "postgres",
      "panels": [],
      "tags": ["postgres"],
      "schemaVersion": 38
    }
